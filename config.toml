# Immich-Go GUI — Application Configuration
# API keys are NEVER stored here; they live in the OS keychain via SecretStore.

schema_version = 1

[general]
theme = "dark"
concurrent_tasks = 0          # 0 = auto (os.cpu_count())
log_level = "INFO"
log_file = ""
log_type = "text"             # "text" | "json"

[ssl]
skip_verify = false

[profiles]
active = "default"

[profiles.default]
name = "Default Server"
server_url = "http://localhost:2283"
# api_key is stored in OS keychain under service "immich-go-gui", key "default"

[profiles.default.upload_defaults]
pause_immich_jobs = false
on_errors = "stop"            # "stop" | "continue" | <integer>
client_timeout = 300
device_uuid = ""
api_trace = false
create_album = false
album_name = ""

[profiles.default.archive_defaults]
write_to = ""
manage_burst = false
manage_raw_jpeg = false
manage_heic_jpeg = false
manage_epson_fastfoto = false

[profiles.default.stack_defaults]
stack_burst = true
stack_raw_jpeg = true
stack_timeshift = "0s"