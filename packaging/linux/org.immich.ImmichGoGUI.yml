app-id: org.immich.ImmichGoGUI
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: Immich-Go-GUI
finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
modules:
  - name: immich-go-gui
    buildsystem: simple
    build-commands:
      - mkdir -p /app/bin
      - cp -r app.dist/* /app/bin/
      - install -Dm644 immich-go-gui.png /app/share/icons/hicolor/512x512/apps/org.immich.ImmichGoGUI.png
      - sed -i 's|Exec=/opt/immich-go-gui/Immich-Go-GUI|Exec=Immich-Go-GUI|' immich-go-gui.desktop
      - sed -i 's|Icon=immich-go-gui|Icon=org.immich.ImmichGoGUI|' immich-go-gui.desktop
      - install -Dm644 immich-go-gui.desktop /app/share/applications/org.immich.ImmichGoGUI.desktop
    sources:
      - type: dir
        path: ../../app.dist
        dest: app.dist
      - type: file
        path: ../../immich-go-gui.png
      - type: file
        path: immich-go-gui.desktop
