name: Build and Release Apps

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for test build (e.g., 0.9.5-rc1)'
        required: false
        default: '1.0.0-test'
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    env:
      VERSION: '1.0.0'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Version
        id: set-version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF_NAME#v}
            if [[ "$VERSION" == *"/"* ]] || [[ -z "$VERSION" ]]; then VERSION="1.0.0-test"; fi
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      # --- WINDOWS BUILD ---
      - name: Build Windows
        if: matrix.name == 'windows'
        shell: bash
        run: |
          NUMERIC_VERSION=$(echo "${{ env.VERSION }}" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+' || echo "1.0.0")
          uv run python -m nuitka --standalone --enable-plugin=pyside6 --output-filename=Immich-Go-GUI.exe --include-data-files=immich-go-gui.png=immich-go-gui.png --include-data-dir=assets=assets --windows-console-mode=disable --windows-icon-from-ico=immich-go-gui.ico --company-name="Shitan198u" --product-name="Immich-Go GUI" --file-version="${NUMERIC_VERSION}.0" --product-version="${NUMERIC_VERSION}.0" app.py

      - name: Create Windows Portable Archive
        if: matrix.name == 'windows'
        run: |
          if (Test-Path "app.dist/app.exe") { Rename-Item -Path "app.dist/app.exe" -NewName "Immich-Go-GUI.exe" }
          Set-Content -Path "app.dist/README.txt" -Value "To launch the application, simply double-click the file named Immich-Go-GUI.exe. You do not need to install anything else."
          Compress-Archive -Path "app.dist/*" -DestinationPath "Immich-Go-GUI-${{ env.VERSION }}-Windows-x86_64-Portable.zip"

      - name: Compile Windows Installer
        if: matrix.name == 'windows'
        shell: powershell
        run: |
          if (-not (Test-Path "C:\Program Files (x86)\Inno Setup 6\ISCC.exe")) {
            choco install innosetup -y
          }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /O"${{ github.workspace }}" /DMyAppVersion="${{ env.VERSION }}" /DMyOutputFilename="Immich-Go-GUI-${{ env.VERSION }}-Windows-x86_64-Setup" packaging/windows/installer.iss
          if (-not (Test-Path "Immich-Go-GUI-${{ env.VERSION }}-Windows-x86_64-Setup.exe") -and (Test-Path "Immich-Go-GUI-Windows-Setup.exe")) {
            Move-Item -Path "Immich-Go-GUI-Windows-Setup.exe" -Destination "Immich-Go-GUI-${{ env.VERSION }}-Windows-x86_64-Setup.exe" -Force
          }

      # --- MACOS BUILD ---
      - name: Setup Node.js
        if: matrix.name == 'macos'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build macOS
        if: matrix.name == 'macos'
        run: |
          uv run python -m nuitka --standalone --enable-plugin=pyside6 --output-filename=Immich-Go-GUI --include-data-files=immich-go-gui.png=immich-go-gui.png --include-data-dir=assets=assets app.py
          npm install -g create-dmg
          create-dmg app.app || true
          mv *.dmg "Immich-Go-GUI-${{ env.VERSION }}-macOS-x86_64.dmg" || true

      # --- LINUX BUILD ---
      - name: Build Linux Standalone
        if: matrix.name == 'linux'
        run: |
          uv run python -m nuitka --standalone --enable-plugin=pyside6 --output-filename=Immich-Go-GUI --include-data-files=immich-go-gui.png=immich-go-gui.png --include-data-dir=assets=assets app.py

      - name: Create Linux Portable Archive
        if: matrix.name == 'linux'
        run: |
          if [ -f app.dist/app.bin ]; then mv app.dist/app.bin app.dist/Immich-Go-GUI; fi
          if [ -f app.dist/app ]; then mv app.dist/app app.dist/Immich-Go-GUI; fi
          echo "To launch the application, double-click the file named Immich-Go-GUI, or run ./Immich-Go-GUI in the terminal. You do not need to install anything else." > app.dist/README.txt
          tar -czvf "Immich-Go-GUI-${{ env.VERSION }}-Linux-x86_64-Portable.tar.gz" -C app.dist .

      - name: Build Linux AppImage
        if: matrix.name == 'linux'
        run: |
          mkdir -p AppDir/usr/bin
          cp -r app.dist/* AppDir/usr/bin/
          cp immich-go-gui.png AppDir/

          cat << 'EOF' > AppDir/immich-go-gui.desktop
          [Desktop Entry]
          Name=Immich-Go GUI
          Exec=Immich-Go-GUI
          Icon=immich-go-gui
          Type=Application
          Categories=Utility;
          EOF

          cat << 'EOF' > AppDir/AppRun
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/Immich-Go-GUI" "$@"
          EOF
          chmod +x AppDir/AppRun

          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract-and-run AppDir "Immich-Go-GUI-${{ env.VERSION }}-Linux-x86_64.AppImage"

      - name: Install nFPM
        if: matrix.name == 'linux'
        run: |
          URL=$(curl -s https://api.github.com/repos/goreleaser/nfpm/releases/latest | jq -r '.assets[] | select(.name | endswith("Linux_x86_64.tar.gz")) | .browser_download_url')
          curl -sL $URL | tar xz nfpm
          sudo mv nfpm /usr/local/bin/

      - name: Build DEB and RPM
        if: matrix.name == 'linux'
        run: |
          cd packaging/linux
          nfpm pkg --packager deb --target "../../Immich-Go-GUI-${{ env.VERSION }}-Linux-x86_64.deb"
          nfpm pkg --packager rpm --target "../../Immich-Go-GUI-${{ env.VERSION }}-Linux-x86_64.rpm"

      # --- UPLOAD ARTIFACTS ---
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Immich-Go-GUI-${{ matrix.name }}
          if-no-files-found: error
          path: |
            Immich-Go-GUI-${{ env.VERSION }}-Windows-x86_64-Setup.exe
            Immich-Go-GUI-${{ env.VERSION }}-Windows-x86_64-Portable.zip
            Immich-Go-GUI-${{ env.VERSION }}-macOS-x86_64.dmg
            Immich-Go-GUI-${{ env.VERSION }}-Linux-x86_64.AppImage
            Immich-Go-GUI-${{ env.VERSION }}-Linux-x86_64-Portable.tar.gz
            Immich-Go-GUI-${{ env.VERSION }}-Linux-x86_64.deb
            Immich-Go-GUI-${{ env.VERSION }}-Linux-x86_64.rpm

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Official Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/Immich-Go-GUI-*-Windows-x86_64-Setup.exe
            artifacts/Immich-Go-GUI-*-Windows-x86_64-Portable.zip
            artifacts/Immich-Go-GUI-*-macOS-x86_64.dmg
            artifacts/Immich-Go-GUI-*-Linux-x86_64.AppImage
            artifacts/Immich-Go-GUI-*-Linux-x86_64-Portable.tar.gz
            artifacts/Immich-Go-GUI-*-Linux-x86_64.deb
            artifacts/Immich-Go-GUI-*-Linux-x86_64.rpm

      - name: Create Test Pre-Release
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "test-${{ needs.build.outputs.version }}"
          name: "Test Build test-${{ needs.build.outputs.version }}"
          prerelease: true
          files: |
            artifacts/Immich-Go-GUI-*-Windows-x86_64-Setup.exe
            artifacts/Immich-Go-GUI-*-Windows-x86_64-Portable.zip
            artifacts/Immich-Go-GUI-*-macOS-x86_64.dmg
            artifacts/Immich-Go-GUI-*-Linux-x86_64.AppImage
            artifacts/Immich-Go-GUI-*-Linux-x86_64-Portable.tar.gz
            artifacts/Immich-Go-GUI-*-Linux-x86_64.deb
            artifacts/Immich-Go-GUI-*-Linux-x86_64.rpm

