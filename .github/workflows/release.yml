name: Build and Release Apps

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for test build (e.g., 0.9.5-rc1)'
        required: false
        default: '1.0.0-test'
  push:
    # branches:
    #   - master
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    env:
      VERSION: '1.0.0'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set Version
        id: set-version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF_NAME#v}
            if [[ "$VERSION" == *"/"* ]] || [[ -z "$VERSION" ]]; then VERSION="1.0.0-test"; fi
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Add Nuitka
        run: uv add --dev nuitka

      # --- WINDOWS BUILD ---
      - name: Build Windows
        if: matrix.name == 'windows'
        run: |
          uv run python -m nuitka --assume-yes-for-downloads --standalone --windows-console-mode=disable --enable-plugin=pyside6 --include-data-files=immich-go-gui.png=immich-go-gui.png app.py

      - name: Compile Windows Installer
        if: matrix.name == 'windows'
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: packaging/windows/installer.iss
          options: /DMyAppVersion=${{ env.VERSION }}

      # --- MACOS BUILD ---
      - name: Build macOS
        if: matrix.name == 'macos'
        run: |
          uv run python -m nuitka --assume-yes-for-downloads --macos-create-app-bundle --enable-plugin=pyside6 --include-data-files=immich-go-gui.png=immich-go-gui.png app.py
          npm install -g create-dmg
          create-dmg app.app || true
          mv *.dmg Immich-Go-GUI-macOS.dmg

      # --- LINUX BUILD ---
      - name: Build Linux Standalone
        if: matrix.name == 'linux'
        run: |
          uv run python -m nuitka --assume-yes-for-downloads --standalone --enable-plugin=pyside6 --include-data-files=immich-go-gui.png=immich-go-gui.png app.py

      - name: Build Linux AppImage
        if: matrix.name == 'linux'
        run: |
          mkdir -p AppDir/usr/bin
          cp -r app.dist/* AppDir/usr/bin/
          cp immich-go-gui.png AppDir/

          cat << 'EOF' > AppDir/immich-go-gui.desktop
          [Desktop Entry]
          Name=Immich-Go GUI
          Exec=app.bin
          Icon=immich-go-gui
          Type=Application
          Categories=Utility;
          EOF

          cat << 'EOF' > AppDir/AppRun
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/app.bin" "$@"
          EOF
          chmod +x AppDir/AppRun

          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract-and-run AppDir Immich-Go-GUI-Linux.AppImage

      - name: Setup nFPM
        if: matrix.name == 'linux'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: nfpm
          version: '~> 2'
          install-only: true

      - name: Build DEB and RPM
        if: matrix.name == 'linux'
        run: |
          cd packaging/linux
          nfpm pkg --packager deb --target ../../Immich-Go-GUI-Linux.deb
          nfpm pkg --packager rpm --target ../../Immich-Go-GUI-Linux.rpm

      # --- UPLOAD ARTIFACTS ---
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Immich-Go-GUI-${{ matrix.name }}
          path: |
            Immich-Go-GUI-Windows-Setup.exe
            Immich-Go-GUI-macOS.dmg
            Immich-Go-GUI-Linux.AppImage
            Immich-Go-GUI-Linux.deb
            Immich-Go-GUI-Linux.rpm

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Official Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/Immich-Go-GUI-Windows-Setup.exe
            artifacts/Immich-Go-GUI-macOS.dmg
            artifacts/Immich-Go-GUI-Linux.AppImage
            artifacts/Immich-Go-GUI-Linux.deb
            artifacts/Immich-Go-GUI-Linux.rpm

      - name: Create Test Pre-Release
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ needs.build.outputs.version }}"
          name: "Test Build v${{ needs.build.outputs.version }}"
          prerelease: true
          files: |
            artifacts/Immich-Go-GUI-Windows-Setup.exe
            artifacts/Immich-Go-GUI-macOS.dmg
            artifacts/Immich-Go-GUI-Linux.AppImage
            artifacts/Immich-Go-GUI-Linux.deb
            artifacts/Immich-Go-GUI-Linux.rpm
