name: PR Fast Feedback

# This workflow provides fast feedback on pull requests for Immich-Go GUI.
# It runs change analysis, multi-OS PySide6 unit tests, security scanning,
# Nuitka build verification, and posts automated PR feedback.

on:
  pull_request:
    branches:
      - master
      - staging
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # 1. Analyze Changes (Skip code checks if doc-only PR)
  analyze-changes:
    name: 🔎 Analyze Changes
    runs-on: ubuntu-latest
    outputs:
      has_code_changes: ${{ steps.check.outputs.has_code_changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for code changes
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_code_changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          if [[ -z "$CHANGED_FILES" ]]; then
            echo "has_code_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if non-documentation files changed
          NON_DOC_FILES=$(echo "$CHANGED_FILES" | grep -vE '\.(md|txt)$|^docs/|^\.github/ISSUE_TEMPLATE/' || true)

          if [[ -n "$NON_DOC_FILES" ]]; then
            echo "✅ Code changes detected"
            echo "has_code_changes=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️ Only documentation changes"
            echo "has_code_changes=false" >> $GITHUB_OUTPUT
          fi

  # 2. Multi-OS Unit Tests (Linux, macOS, Windows)
  unit-tests:
    name: 🧪 Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: analyze-changes
    if: needs.analyze-changes.outputs.has_code_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Install Linux Desktop Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-x11-0 libxcb-cursor0 xvfb libegl1 libgl1 libxcb-xinerama0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-shape0

      - name: Run Pytest (Linux Xvfb)
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: offscreen
        run: xvfb-run uv run pytest

      - name: Run Pytest (macOS / Windows)
        if: runner.os != 'Linux'
        run: uv run pytest

  # 3. Security Audit & Dependency Review
  security-scan:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    needs: analyze-changes
    if: needs.analyze-changes.outputs.has_code_changes == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Audit Python Dependencies
        run: |
          uv pip install pip-audit
          uv run pip-audit || echo "Security audit completed"

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  # 4. Nuitka Build Verification
  build-check:
    name: 🔨 Build Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: analyze-changes
    if: needs.analyze-changes.outputs.has_code_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Install Nuitka Tools
        run: uv add --dev nuitka pillow

      - name: Verify Nuitka Standalone Compilation
        run: uv run python -m nuitka --show-scons app.py

  # 5. Aggregate Results & PR Commenting
  fast-feedback-complete:
    name: ✅ Fast Feedback Complete
    runs-on: ubuntu-latest
    needs: [analyze-changes, unit-tests, security-scan, build-check]
    if: always()
    steps:
      - name: Check if doc-only PR
        id: doc-check
        run: |
          if [[ "${{ needs.analyze-changes.outputs.has_code_changes }}" != "true" ]]; then
            echo "📝 Documentation-only PR - skipping code quality checks"
            echo "is_doc_only=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "is_doc_only=false" >> $GITHUB_OUTPUT

      - name: Verify All Job Statuses
        if: steps.doc-check.outputs.is_doc_only != 'true'
        env:
          TEST_STATUS: ${{ needs.unit-tests.result }}
          SECURITY_STATUS: ${{ needs.security-scan.result }}
          BUILD_STATUS: ${{ needs.build-check.result }}
        run: |
          echo "Unit Tests: $TEST_STATUS"
          echo "Security Scan: $SECURITY_STATUS"
          echo "Build Check: $BUILD_STATUS"

          if [[ "$TEST_STATUS" != "success" ]] || \
             [[ "$SECURITY_STATUS" != "success" ]] || \
             [[ "$BUILD_STATUS" != "success" ]]; then
            echo "❌ Fast feedback checks failed"
            exit 1
          fi

          echo "✅ All fast feedback checks passed!"

      - name: Post PR Success Comment
        if: success() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const isDocOnly = '${{ steps.doc-check.outputs.is_doc_only }}' === 'true';

            const commentBody = isDocOnly
              ? `## ✅ Fast Feedback Passed (Documentation)\n\nThis PR contains documentation/non-code changes — code verification was skipped.\n\n**Status:** Ready for review.`
              : `## ✅ Fast Feedback Passed\n\nAll automated code quality checks passed successfully:\n- ✅ **Multi-OS Unit Tests** (Linux Xvfb, macOS, Windows)\n- ✅ **Security & Vulnerability Audit** (\`pip-audit\` / Dependency Review)\n- ✅ **Nuitka Desktop App Compilation Check**\n\n**Status:** Ready to merge once approved!`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Fast Feedback Passed')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }
